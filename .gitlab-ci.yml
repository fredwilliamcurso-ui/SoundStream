image: cirruslabs/android-sdk:34

variables:
  # Disable the Gradle daemon to save memory in CI environments
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .npm/
    - node_modules/
    - .gradle/wrapper/
    - .gradle/caches/

stages:
  - build

build_android:
  stage: build
  before_script:
    - export GRADLE_USER_HOME=$(pwd)/.gradle
    # Install Node.js (V22) to build web assets and run scripts
    - apt-get update -yq && apt-get install -yq curl
    - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
    - apt-get install -yq nodejs
    # Verify toolchain versions
    - node --version
    - npm --version
    - java -version
    # Install Node dependencies using cache
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run build:android
  artifacts:
    name: "android-release-bundle"
    paths:
      - public/app-release.aab
    expire_in: 1 week
