<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary SEO Metadata -->
    <title>SoundStream - Social Music Stream & Creator Hub</title>
    <meta name="description" content="SoundStream v5.0 is the premier social music streaming and creator dashboard platform. Discover trending tracks, manage custom playlists, and explore deep artist analytics." />
    <link rel="canonical" href="https://soundstreamy.com/" />
    
    <!-- Favicon & Brand Icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://soundstreamy.com/" />
    <meta property="og:title" content="SoundStream - Social Music Stream & Creator Hub" />
    <meta property="og:description" content="SoundStream v5.0 is the premier social music streaming and creator dashboard platform. Discover trending tracks, manage custom playlists, and explore deep artist analytics." />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://soundstreamy.com/" />
    <meta property="twitter:title" content="SoundStream - Social Music Stream & Creator Hub" />
    <meta property="twitter:description" content="SoundStream v5.0 is the premier social music streaming and creator dashboard platform. Discover trending tracks, manage custom playlists, and explore deep artist analytics." />
    <meta property="twitter:image" content="/og-image.png" />

    <!-- Web App / PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SoundStream" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
