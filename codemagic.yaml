workflows:
  android-release:
    name: SoundStream Android Release (.aab)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: lts
      java: 21
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
    scripts:
      - name: Install Node.js dependencies
        script: |
          npm ci
      - name: Build web application
        script: |
          npm run build
      - name: Sync with Capacitor
        script: |
          npx cap sync android
      - name: Build Android release using Gradle
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon --stacktrace
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
